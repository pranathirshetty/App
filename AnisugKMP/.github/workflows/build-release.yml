name: Build and Release AnisugKMP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Generate Versioning
        id: version
        run: |
          echo "build_num=$(date +'%y%m%d%H%M')" >> $GITHUB_OUTPUT
          echo "version_name=0.9.9-$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          mkdir -p AnisugKMP/signing
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > AnisugKMP/signing/android.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > AnisugKMP/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> AnisugKMP/key.properties
          echo "keyAlias=release" >> AnisugKMP/key.properties
          echo "storeFile=../signing/android.jks" >> AnisugKMP/key.properties

      - name: Build Android APK
        run: |
          cd AnisugKMP
          chmod +x gradlew
          ./gradlew :composeApp:assembleRelease --no-daemon \
            -PappVersion=${{ steps.version.outputs.version_name }} \
            -PappBuildNumber=${{ steps.version.outputs.build_num }}

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: AnisugKMP/composeApp/build/outputs/apk/release/*.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Versioning
        id: version
        run: |
          echo "version_name=0.9.9-$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm desktop-file-utils fakeroot

      - name: Build Linux Distributions
        run: |
          cd AnisugKMP
          chmod +x gradlew
          ./gradlew packageDeb packageRpm packageAppImage --no-daemon \
            -PappVersion=${{ steps.version.outputs.version_name }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-distributions
          path: |
            AnisugKMP/composeApp/build/compose/binaries/main/deb/*.deb
            AnisugKMP/composeApp/build/compose/binaries/main/rpm/*.rpm
            AnisugKMP/composeApp/build/compose/binaries/main/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Versioning
        id: version
        shell: bash
        run: |
          echo "version_name=0.9.9-$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Decode Signing Certificate
        shell: pwsh
        run: |
          mkdir AnisugKMP/signing -Force
          [System.Convert]::FromBase64String("${{ secrets.WINDOWS_PFX_BASE64 }}") | Set-Content AnisugKMP/signing/windows.pfx -Encoding Byte

      - name: Build Windows Distributions
        shell: pwsh
        run: |
          cd AnisugKMP
          $VERSION="${{ steps.version.outputs.version_name }}"
          ./gradlew packageMsi packageExe --no-daemon `
            -PappVersion=$VERSION `
            -Pcompose.desktop.signing.certificateFile=../signing/windows.pfx `
            -Pcompose.desktop.signing.keyPassword=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-distributions
          path: |
            AnisugKMP/composeApp/build/compose/binaries/main/msi/*.msi
            AnisugKMP/composeApp/build/compose/binaries/main/exe/*.exe

  create-release:
    needs: [build-android, build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-apks/*.apk
            linux-distributions/*.deb
            linux-distributions/*.rpm
            linux-distributions/*.AppImage
            windows-distributions/*.msi
            windows-distributions/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
