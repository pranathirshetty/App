name: Build and Release App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App Version (e.g. 1.0.0)'
        required: true
      build_number:
        description: 'Build Number (e.g. 1)'
        required: true
      type:
        description: 'Release Type'
        required: true
        default: 'beta'
        type: choice
        options:
          - latest
          - beta

jobs:
  # ==================== ANDROID BUILD ====================
  build-android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ==================== iOS BUILD ====================
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i '' 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: |
          flutter build ios --release --no-codesign
          
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r kuudere-ios-unsigned.ipa Payload
          mv kuudere-ios-unsigned.ipa ../../..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: kuudere-ios-unsigned.ipa

  # ==================== LINUX BUILD ====================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../kuudere-linux-x64.tar.gz .

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: kuudere-linux-x64.tar.gz

  # ==================== WINDOWS BUILD ====================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          (Get-Content pubspec.yaml) -replace '^version: .*', 'version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}' | Set-Content pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath kuudere-windows-x64.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: kuudere-windows-x64.zip

  # ==================== MACOS BUILD ====================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i '' 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS (unsigned)
        run: flutter build macos --release

      - name: Package macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../kuudere-macos.zip *.app

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: kuudere-macos.zip

  # ==================== WEB BUILD ====================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Package Web build
        run: |
          cd build/web
          tar -czf ../../kuudere-web.tar.gz .

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: kuudere-web.tar.gz

  # ==================== CREATE RELEASE ====================
  create-release:
    name: Create Release
    needs: [build-android, build-ios, build-linux, build-windows, build-macos, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}
          name: Release v${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}
          prerelease: ${{ github.event.inputs.type == 'beta' }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/android-aab/app-release.aab
            artifacts/ios-ipa/kuudere-ios-unsigned.ipa
            artifacts/linux-x64/kuudere-linux-x64.tar.gz
            artifacts/windows-x64/kuudere-windows-x64.zip
            artifacts/macos-app/kuudere-macos.zip
            artifacts/web-build/kuudere-web.tar.gz
