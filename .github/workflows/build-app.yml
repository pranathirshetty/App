name: Build and Release App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App Version (e.g. 1.0.0)'
        required: true
      build_number:
        description: 'Build Number (e.g. 1)'
        required: true
      type:
        description: 'Release Type'
        required: true
        default: 'beta'
        type: choice
        options:
          - latest
          - beta

jobs:
  # ==================== ANDROID BUILD ====================
  build-android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ vars.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storeFile=upload-keystore.jks" > android/key.properties
          echo "storePassword=${{ vars.ANDROID_STORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ vars.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ vars.ANDROID_KEY_PASSWORD }}" >> android/key.properties

      - name: Build Universal APK
        env:
          ARM_ONLY: true
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Anisuge-universal.apk

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cd build/app/outputs/flutter-apk
          mv Anisuge-universal.apk AniSurge-universal-$VERSION.apk
          mv app-armeabi-v7a-release.apk AniSurge-armeabi-v7a-$VERSION.apk
          mv app-arm64-v8a-release.apk AniSurge-arm64-v8a-$VERSION.apk
          mv app-x86_64-release.apk AniSurge-x86_64-$VERSION.apk

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ==================== iOS BUILD ====================
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i '' 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: |
          flutter build ios --release --no-codesign
          
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r Anisuge-ios-unsigned.ipa Payload
          mv Anisuge-ios-unsigned.ipa ../../..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: Anisuge-ios-unsigned.ipa

  # ==================== LINUX BUILD ====================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libasound2-dev libmpv-dev mpv

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../Anisuge-linux-x64.tar.gz .

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: Anisuge-linux-x64.tar.gz

  # ==================== WINDOWS BUILD ====================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          (Get-Content pubspec.yaml) -replace '^version: .*', 'version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}' | Set-Content pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Create Inno Setup Script
        run: |
          $version = "${{ github.event.inputs.version }}"
          $script = @"
          [Setup]
          AppName=Anisuge
          AppVersion=$version
          AppPublisher=Anisuge
          AppSupportURL=https://github.com/iotserver24/Anisurge-new
          DefaultDirName={autopf}\Anisuge
          DefaultGroupName=Anisuge
          OutputDir=.
          OutputBaseFilename=Anisuge-Setup-Windows-x64
          Compression=lzma
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          SetupIconFile=windows\runner\resources\app_icon.ico
          UninstallDisplayIcon={app}\Anisuge.exe
          
          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Icons]
          Name: "{group}\Anisuge"; Filename: "{app}\Anisuge.exe"
          "@
          Set-Content -Path setup.iss -Value $script

      - name: Compile Inno Setup Script
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss'

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: Anisuge-Setup-Windows-x64.exe

  # ==================== MACOS BUILD ====================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i '' 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS (unsigned)
        run: flutter build macos --release

      - name: Package macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../Anisuge-macos.zip *.app

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: Anisuge-macos.zip

  # ==================== WEB BUILD ====================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}/' pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Package Web build
        run: |
          cd build/web
          tar -czf ../../Anisuge-web.tar.gz .

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: Anisuge-web.tar.gz

  # ==================== CREATE RELEASE ====================
  create-release:
    name: Create Release
    needs: [build-android, build-ios, build-linux, build-windows, build-macos, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}
          name: Release v${{ github.event.inputs.version }}+${{ github.event.inputs.build_number }}
          prerelease: ${{ github.event.inputs.type == 'beta' }}
          generate_release_notes: true
          files: |
            artifacts/android-apks/*.apk
            artifacts/android-aab/app-release.aab
            artifacts/ios-ipa/Anisuge-ios-unsigned.ipa
            artifacts/linux-x64/Anisuge-linux-x64.tar.gz
            artifacts/windows-setup/Anisuge-Setup-Windows-x64.exe
            artifacts/macos-app/Anisuge-macos.zip
            artifacts/web-build/Anisuge-web.tar.gz

      - name: Delete Artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            android-apks
            android-aab
            ios-ipa
            linux-x64
            windows-setup
            macos-app
            web-build
